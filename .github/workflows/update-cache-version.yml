name: Update SW Cache Version

on:
  push:
    branches: [main]
    paths-ignore:
      - 'sw.js'  # sw.js自身の変更でループしないようにする

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update cache version in sw.js
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          sed -i "s/const CACHE_NAME = 'cyber-tracker-v[^']*'/const CACHE_NAME = 'cyber-tracker-v${VERSION}'/" sw.js
          echo "Updated cache version to: cyber-tracker-v${VERSION}"

      - name: Commit and push updated sw.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: update SW cache version [skip ci]"
          git push
