<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初期設定 - 大学進捗トラッカー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f4f6;
      padding: 24px 16px;
      color: #1f2937;
    }
    h1 { font-size: 20px; margin-bottom: 6px; }
    p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 15px; margin-bottom: 12px; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      margin-top: 12px;
    }
    .btn:hover { background: #1d4ed8; }
    .btn-green {
      background: #10b981;
    }
    .btn-green:hover { background: #059669; }
    .step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .step-num {
      background: #2563eb;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    #json-output {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      font-family: monospace;
      word-break: break-all;
      color: #374151;
      margin-top: 8px;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
    }
    .copy-notice {
      display: none;
      color: #059669;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-top: 8px;
    }
    /* ── iPhoneで開いたとき用の入力UI ── */
    #import-section {
      display: none;
    }
    textarea {
      width: 100%;
      height: 120px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      font-family: monospace;
      resize: vertical;
      margin-top: 8px;
    }
    .result-msg {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .result-ok { background: #d1fae5; color: #065f46; }
    .result-err { background: #fee2e2; color: #991b1b; }

    /* タブ切り替え */
    .tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 16px; }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
    }
    .tab-btn.active {
      color: #2563eb;
      border-bottom: 2px solid #2563eb;
      margin-bottom: -2px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <h1>📱 科目データの転送</h1>
  <p>PCとiPhoneの両方で使えます。状況に合わせてタブを選択してください。</p>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('pc')">💻 PC（送る側）</button>
      <button class="tab-btn" onclick="switchTab('iphone')">📱 iPhone（受け取る側）</button>
    </div>

    <!-- PC側：JSON出力 -->
    <div class="tab-panel active" id="tab-pc">
      <h2>📋 使い方（PC）</h2>
      <div class="step">
        <div class="step-num">1</div>
        <div>「JSONをコピー」ボタンを押す</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div>コピーしたテキストをiPhoneにAirDrop・メモ・LINEなどで送る</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div>iPhoneでこのページを開き「iPhone（受け取る側）」タブへ</div>
      </div>

      <div id="json-output">生成中...</div>
      <button class="btn" onclick="copyJSON()">📋 JSONをコピー</button>
      <div class="copy-notice" id="copy-notice">✅ コピーしました！</div>
    </div>

    <!-- iPhone側：JSON貼り付けインポート -->
    <div class="tab-panel" id="tab-iphone">
      <h2>📥 データを読み込む（iPhone）</h2>
      <div class="step">
        <div class="step-num">1</div>
        <div>PCからもらったJSONテキストを下に貼り付ける</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div>「保存する」ボタンを押す</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div>成功メッセージが出たらメインページに移動</div>
      </div>

      <textarea id="json-input" placeholder='{"subjects":[...],"weeklyPlan":[...]} の形式で貼り付けてください'></textarea>
      <button class="btn btn-green" onclick="importData()">💾 保存する</button>
      <div class="result-msg" id="result-msg"></div>
      <a href="./index.html"><button class="btn" style="margin-top:8px;background:#6b7280;">🏠 メインページへ</button></a>
    </div>
  </div>

  <script>
    // ========================================
    // 科目データ
    // ========================================
    const SUBJECTS = [
      { id: 'it-basics', name: 'ITのための基礎知識', type: '専門', credits: 2, totalLessons: 15, chaptersPerLesson: 4, color: '#f59e0b', deadline: '2026-08-06' },
      { id: 'internet', name: 'インターネット入門', type: '専門', credits: 2, totalLessons: 15, chaptersPerLesson: 4, color: '#f59e0b', deadline: '2026-08-06' },
      { id: 'datascience', name: 'データサイエンス入門', type: '専門', credits: 2, totalLessons: 15, chaptersPerLesson: 4, color: '#f59e0b', deadline: '2026-08-06' },
      { id: 'office', name: 'オフィスソフトウェア基礎演習', type: '専門', credits: 2, totalLessons: 15, chaptersPerLesson: 4, color: '#f59e0b', deadline: '2026-08-06' },
      { id: 'project', name: 'プロジェクトマネジメント入門', type: '専門', credits: 2, totalLessons: 15, chaptersPerLesson: 4, color: '#f59e0b', deadline: '2026-08-06' },
      { id: 'study-skills', name: 'スタディスキル入門', type: '教養', credits: 1, totalLessons: 8, chaptersPerLesson: 4, color: '#10b981', deadline: '2026-06-02' },
      { id: 'ai', name: 'AI（人工知能）入門', type: '教養', credits: 1, totalLessons: 8, chaptersPerLesson: 4, color: '#10b981', deadline: '2026-06-16' },
      { id: 'psychology', name: '心理学入門', type: '教養', credits: 1, totalLessons: 8, chaptersPerLesson: 4, color: '#10b981', deadline: '2026-06-16' },
      { id: 'webdesign', name: 'Webデザイン入門', type: '教養', credits: 1, totalLessons: 8, chaptersPerLesson: 4, color: '#10b981', deadline: '2026-06-16' },
      { id: 'photo', name: '写真・映像制作の基礎', type: '教養', credits: 1, totalLessons: 8, chaptersPerLesson: 4, color: '#10b981', deadline: '2026-06-16' },
      { id: 'game', name: 'ゲームの歴史と未来', type: '教養', credits: 1, totalLessons: 8, chaptersPerLesson: 4, color: '#10b981', deadline: '2026-08-04' },
      { id: 'english', name: '基礎英語Ⅰ', type: '外国語', credits: 2, totalLessons: 15, chaptersPerLesson: 4, color: '#8b5cf6', deadline: '2026-08-04' }
    ];

    const WEEKLY_PLAN = [
      { day: 0, label: '日', subjects: [], isRest: true },
      { day: 1, label: '月', subjects: ['it-basics', 'study-skills'], slots: 2 },
      { day: 2, label: '火', subjects: ['internet', 'ai'], slots: 2 },
      { day: 3, label: '水', subjects: ['datascience', 'psychology'], slots: 2 },
      { day: 4, label: '木', subjects: ['english', 'office'], slots: 2 },
      { day: 5, label: '金', subjects: ['project', 'webdesign'], slots: 2 },
      { day: 6, label: '土', subjects: ['photo', 'game'], slots: 2 }
    ];

    // ========================================
    // タブ切り替え
    // ========================================
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'pc') || (i === 1 && tab === 'iphone'));
      });
      document.getElementById('tab-pc').classList.toggle('active', tab === 'pc');
      document.getElementById('tab-iphone').classList.toggle('active', tab === 'iphone');
    }

    // ========================================
    // PC側：JSONを生成してコピー
    // ========================================
    const jsonData = JSON.stringify({ subjects: SUBJECTS, weeklyPlan: WEEKLY_PLAN });

    window.onload = () => {
      document.getElementById('json-output').textContent = jsonData;
    };

    function copyJSON() {
      navigator.clipboard.writeText(jsonData).then(() => {
        const notice = document.getElementById('copy-notice');
        notice.style.display = 'block';
        setTimeout(() => notice.style.display = 'none', 2000);
      }).catch(() => {
        // clipboard APIが使えない場合はselect
        const el = document.getElementById('json-output');
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('コピーしました！');
      });
    }

    // ========================================
    // iPhone側：JSONを貼り付けて保存
    // ========================================
    function importData() {
      const text = document.getElementById('json-input').value.trim();
      const msg = document.getElementById('result-msg');
      msg.style.display = 'none';

      if (!text) {
        msg.textContent = '❌ テキストが入力されていません';
        msg.className = 'result-msg result-err';
        msg.style.display = 'block';
        return;
      }

      try {
        const parsed = JSON.parse(text);
        if (!parsed.subjects || !parsed.weeklyPlan) throw new Error('形式エラー');
        localStorage.setItem('cyber-tracker-subjects', JSON.stringify(parsed.subjects));
        localStorage.setItem('cyber-tracker-weekly', JSON.stringify(parsed.weeklyPlan));
        msg.textContent = `✅ ${parsed.subjects.length}科目のデータを保存しました！メインページに移動してください。`;
        msg.className = 'result-msg result-ok';
        msg.style.display = 'block';
      } catch(e) {
        msg.textContent = '❌ 読み込み失敗：正しいJSON形式で貼り付けてください';
        msg.className = 'result-msg result-err';
        msg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
